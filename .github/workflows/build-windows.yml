name: Build packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Noizemaker Windows package
        shell: powershell
        run: .\scripts\build_windows_package.ps1 -LoveVersion 11.5

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: noizemaker-windows
          path: dist/noizemaker-windows.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y love zip curl file squashfs-tools desktop-file-utils

      - name: Make Linux build script executable
        run: chmod +x ./scripts/build_linux_appimage.sh

      - name: Show Linux LOVE runtime
        run: |
          command -v love
          love --version
          file "$(command -v love)"

      - name: Build Noizemaker Linux AppImage
        run: |
          export LOVE_BIN="$(command -v love)"
          ./scripts/build_linux_appimage.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: noizemaker-linux
          path: |
            dist/noizemaker-linux-x86_64.AppImage
            dist/noizemaker-linux-x86_64.AppImage.sha256
          retention-days: 30

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: noizemaker-windows
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: noizemaker-linux
          path: dist

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" \
              dist/noizemaker-windows.zip \
              dist/noizemaker-linux-x86_64.AppImage \
              dist/noizemaker-linux-x86_64.AppImage.sha256 \
              --repo "$GH_REPO" \
              --clobber
          else
            gh release create "$tag" \
              dist/noizemaker-windows.zip \
              dist/noizemaker-linux-x86_64.AppImage \
              dist/noizemaker-linux-x86_64.AppImage.sha256 \
              --repo "$GH_REPO" \
              --generate-notes \
              --title "$tag"
          fi
