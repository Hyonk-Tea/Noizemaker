name: Build Windows package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Noizemaker Windows package
        shell: powershell
        run: .\scripts\build_windows_package.ps1 -LoveVersion 11.5

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: noizemaker-windows
          path: dist/noizemaker-windows.zip
          retention-days: 30

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "dist/noizemaker-windows.zip"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --verify-tag --generate-notes --title $tag
          }
